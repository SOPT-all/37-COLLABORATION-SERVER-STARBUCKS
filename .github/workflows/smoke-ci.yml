name: PR Smoke Test

on:
  pull_request:
    types: [opened, synchronize, reopened] # reopened 추가 권장
    branches: [develop]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'Dockerfile'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      # 1. 코드 가져오기
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 자바 17 설치
      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 실행 권한 부여
      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      # 4. 이미지 빌드 (Docker Hub에 푸시 X)
      - name: Docker 이미지 빌드
        run: |
          ./gradlew bootJar -x test
          docker build -t test-image .

      # 5. 테스트 컨테이너 실행
      - name: 테스트 컨테이너 실행
        run: |
          docker run -d \
            --name test-container \
            -p 8080:8080 \
            -e SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver \
            -e SPRING_DATASOURCE_URL="jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1" \
            -e SPRING_DATASOURCE_USERNAME=sa \
            -e SPRING_DATASOURCE_PASSWORD= \
            -e SPRING_JPA_HIBERNATE_DDL_AUTO=create \
            -e SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect \
            test-image

      # 6. 헬스 체크
      - name: 헬스 체크
        run: |
          echo "[서버 부팅 대기 중...]"
          sleep 20
          
          echo "[Health Check 시도...]"
          curl --fail --retry 5 --retry-delay 5 --retry-connrefused http://localhost:8080/actuator/health
          
          echo "[✅ 스모크 테스트 성공]"

      # 7. 컨테이너 로그 확인 (실패했을 때만)
      - name: 실패시 로그 확인
        if: failure()
        run: docker logs test-container